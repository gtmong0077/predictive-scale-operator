apiVersion: autoscaling.eventscale.com/v1
kind: EventScalePolicy
metadata:
  name: concert-ticket-open
  namespace: ticketing
spec:
  targetDeployment: ticket-api
  openTime: "2026-06-09T20:00:00+09:00"

  expectedPeakRPS: 5000
  podStableRPS: 120
  targetUtilization: 0.7
  minReplicas: 3
  maxReplicas: 80

  readinessPercentile: p95
  warmupSeconds: 30
  startupProfile:
    detectDecideSeconds: 20    # T_detect(15s HPA) + T_decide
    nodeSeconds: 0             # kind: 0, EKS+Karpenter: 실측값
    podReadySeconds: 90        # k6 profiling p95
    safetyMarginSeconds: 30

  stepPolicy:
    - offsetSeconds: 180
      ratio: 0.4
    - offsetSeconds: 90
      ratio: 0.75
    - offsetSeconds: 30
      ratio: 1.0

  scaleDownGuardMinutes: 10
  maxOverprovisionMinutes: 15