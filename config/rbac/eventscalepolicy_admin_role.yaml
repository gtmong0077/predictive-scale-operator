# This rule is not used by the project predictive-scale-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over autoscaling.eventscale.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: predictive-scale-operator
    app.kubernetes.io/managed-by: kustomize
  name: eventscalepolicy-admin-role
rules:
- apiGroups:
  - autoscaling.eventscale.com
  resources:
  - eventscalepolicies
  verbs:
  - '*'
- apiGroups:
  - autoscaling.eventscale.com
  resources:
  - eventscalepolicies/status
  verbs:
  - get
