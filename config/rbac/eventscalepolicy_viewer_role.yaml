# This rule is not used by the project predictive-scale-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to autoscaling.eventscale.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: predictive-scale-operator
    app.kubernetes.io/managed-by: kustomize
  name: eventscalepolicy-viewer-role
rules:
- apiGroups:
  - autoscaling.eventscale.com
  resources:
  - eventscalepolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling.eventscale.com
  resources:
  - eventscalepolicies/status
  verbs:
  - get
